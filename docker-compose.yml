services:
  app:
    build: .
    ports:
      - "3099:3001"
    volumes:
      - db-data:/app/data
    environment:
      - PORT=3001
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/api/users"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  db-data:
